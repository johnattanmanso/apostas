<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Configurações - A Cara da Riqueza</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>A Cara da Riqueza</h1>
    <nav>
      <a href="dashboard.html" class="nav-button">Dashboard</a>
      <a href="nova-aposta.html" class="nav-button">Nova Aposta</a>
      <a href="movimentacao.html" class="nav-button">Movimentação</a>
      <a href="historico.html" class="nav-button">Histórico</a>
      <a href="configuracoes.html" class="nav-button active">Configurações</a>
      <button id="logout-button">Sair</button>
    </nav>
  </header>

  <main id="app-screen">
    <section id="configuracoes" class="tab-content active">
      <h2>Adicionar Jogador</h2>
      <div class="add-player-form">
        <input type="text" id="new-player-name" placeholder="Nome do jogador" />
        <button id="add-player-button">Adicionar Jogador</button>
      </div>

      <h2>Jogadores Ativos</h2>
      <table class="player-table">
        <thead>
          <tr><th>Nome</th><th>Saldo</th><th>Ações</th></tr>
        </thead>
        <tbody id="active-player-list-tbody"></tbody>
      </table>

      <hr>

      <h2>Tipos de Jogo</h2>
      <div class="add-game-form">
        <input type="text" id="new-game-name" placeholder="Nome do jogo" />
        <input type="number" id="new-game-value" placeholder="Valor por jogo" step="0.01" />
        <button id="add-game-type-button">Adicionar Jogo</button>
      </div>
    </section>
  </main>

  <div id="loader" class="loader"></div>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/configuracoes.js"></script>
</body>
</html>
