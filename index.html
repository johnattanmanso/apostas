<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Cara da Riqueza - Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="login-page">
  <div class="login-container">
    <header style="text-align: center; margin-bottom: 2rem;">
        <h1 style="color: var(--primary-color);">A Cara da Riqueza</h1>
        <p>Sistema de Gestão de Apostas</p>
    </header>

    <form id="login-form">
      <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" name="email" placeholder="E-mail" required autocomplete="username" />
      </div>
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" name="password" placeholder="Senha" required autocomplete="current-password" />
      </div>
      <button type="submit" id="login-button">Entrar</button>
    </form>
  </div>

  <div id="loader" class="loader"></div>
  
  <script type="module" src="js/auth.js"></script>
</body>
</html>
